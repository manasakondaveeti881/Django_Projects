<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightgreen;
        }
    </style>
</head>

<body>

<h2>Enter Student Details</h2>

<!-- FORM -->
<form method="POST">
    {% csrf_token %}

    <label>Name:</label>
    <input type="text" name="name" required>

    <br><br>

    <label>Email:</label>
    <input type="email" name="email" required>

    <br><br>

    <button type="submit">Submit</button>
</form>

<hr>

<h2>Student Table</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Email</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
