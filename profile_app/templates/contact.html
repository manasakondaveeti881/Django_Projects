<!DOCTYPE html>
<html>
<head>

    <title>Contact Page</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container{
            width: 40%;
            margin: auto;
            background-color: white;
            padding: 30px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, textarea{

            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button{

            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        h1{
            color: darkblue;
        }

        .success{
            color: green;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Contact Form</h1>

    <!-- Success Message -->

    <p class="success">{{ message }}</p>

    <form method="POST">

        {% csrf_token %}

        <!-- Name -->

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter Name">


        <!-- Email -->

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter Email">


        <!-- Message -->

        <label>Message</label>
        <textarea name="message" rows="5" placeholder="Enter Message"></textarea>


        <!-- Submit Button -->

        <button type="submit">Submit</button>

    </form>

    <br>

    <a href="/">Go To Profile Page</a>

</div>

</body>
</html>
